<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Adventure | QuestLearn</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="game-body">
    <nav class="game-nav">
        <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>
        <div class="level-info">Level: <span id="level-num">1</span></div>
        <div class="xp-display">⭐ <span id="xp-count">450</span></div>
    </nav>

    <div class="game-container">
        <div class="quest-box">
            <div class="mascot-section">
                <span class="fox-emoji">🦊</span>
                <div class="bubble" id="instruction-text">Loading quest...</div>
            </div>

            <div id="interactive-area" class="interactive-area">
                </div>

            <div class="action-section">
                <div id="feedback-text" class="feedback"></div>
                <button class="check-button" id="main-action-btn">Check Answer!</button>
            </div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>AWESOME! 🎉</h2>
            <p id="win-msg">+50 XP Earned!</p>
            <button id="next-btn" class="next-level-btn">Next Adventure ➔</button>
        </div>
    </div>

    <script src="math.js"></script>
</body>
</html>
