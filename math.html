<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Mastery | QuestLearn</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="lesson-page">
    <nav class="main-nav">
        <div class="nav-logo" onclick="window.location.href='hub.html'">🚀 QuestLearn</div>
        <div class="lesson-title" id="lesson-title">Math Quest</div>
        <div class="xp">⭐ <span id="xp-val">450</span> XP</div>
    </nav>

    <div class="lesson-container">
        <aside class="instruction-panel">
            <div class="mascot-guide">
                <span class="mascot-avatar">🦊</span>
                <div class="speech-bubble">
                    <p id="question-text">Loading...</p>
                </div>
            </div>
            <div class="feedback-area" id="feedback"></div>
            <button class="btn btn-primary" id="check-btn">Check Answer</button>
        </aside>

        <main class="interactive-panel">
            <div class="pizza-container">
                <div class="pizza" id="pizza-base"></div>
            </div>
        </main>
    </div>

    <div class="modal" id="success-modal">
        <div class="modal-content">
            <h2>Shabash! 🏆</h2>
            <p>Aap ne sahi jawab diya!</p>
            <button class="btn btn-primary" onclick="window.location.href='hub.html'">Wapas Hub Par Jayein</button>
        </div>
    </div>

    <canvas id="confetti" style="display:none; position:fixed; top:0; left:0; pointer-events:none;"></canvas>

    <script src="math.js"></script>
</body>
</html>
